name: tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      max-parallel: 3
      matrix:
        python-version: ["3.11"]

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install acoustotreams[test,coverage,io]
          python -m pip install pytest pytest-cov

      - name: Run tests
        run: |
          python -m pytest tests/unit --cov=acoustotreams --cov-report=html

      - name: Get coverage report
        run: |
          python -m coverage json
          # generate endpoint.json here

      - name: Deploy report
        if: ${{ matrix.python-version == '3.11' }}
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: htmlcov
          FOLDER: htmlcov
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}